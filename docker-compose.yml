services:
  postgres:
    image: postgres:16-alpine
    container_name: capture-flag-postgres
    environment:
      POSTGRES_DB: capture_flag
      POSTGRES_USER: capture_flag
      POSTGRES_PASSWORD: capture_flag
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - capture_flag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capture_flag -d capture_flag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  capture_flag_postgres_data:
